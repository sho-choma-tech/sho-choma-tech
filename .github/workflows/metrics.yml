name: Metrics
on:
  # 毎日00:00 UTCに更新
  schedule:
    - cron: "0 0 * * *"
  # 手動実行できるように
  workflow_dispatch:
  # mainへのpush時にも更新
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  languages:
    runs-on: ubuntu-latest
    steps:
      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          # 公開リポジトリの集計にはGITHUB_TOKENで十分
          token: ${{ github.token }}
          user: sho-choma-tech
          filename: github-metrics-languages.svg
          # 言語プラグインだけを描画
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
